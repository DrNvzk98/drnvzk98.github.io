<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Showcase | Audria Neviezka</title>
    <!-- Tailwind & Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- JQuery & Turn.js via CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; }
        /* Mengatur ukuran area buku */
        #flipbook {
            width: 800px;
            height: 500px;
        }
        /* Mengatur bayangan halaman agar efek kertasnya terasa nyata */
        #flipbook .page {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between items-center text-gray-300 py-10">

    <!-- Tombol Kembali ke Galeri Desain -->
    <div class="w-full max-w-5xl px-6 flex justify-between items-center">
        <a href="../desain.html" class="text-xs font-bold tracking-[0.3em] text-gray-400 hover:text-[#E29578] transition flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            BACK TO GALLERY
        </a>
        <span class="text-xs tracking-widest text-zinc-600 font-bold uppercase">Project 01 // Editorial Showcase</span>
    </div>

    <!-- Area Kontainer Flipbook -->
    <div class="my-auto py-8">
        <div id="flipbook" class="mx-auto">
            <!-- HALAMAN 1 (Cover Depan) -->
            <div class="page"><img src="assets/book1/page1.jpg" class="w-full h-full object-cover"></div>
            <!-- HALAMAN 2 -->
            <div class="page"><img src="assets/book1/page2.jpg" class="w-full h-full object-cover"></div>
            <!-- HALAMAN 3 -->
            <div class="page"><img src="assets/book1/page3.jpg" class="w-full h-full object-cover"></div>
            <!-- HALAMAN 4 (Cover Belakang) -->
            <div class="page"><img src="assets/book1/page4.jpg" class="w-full h-full object-cover"></div>
        </div>
    </div>

    <!-- Petunjuk Navigasi Tambahan -->
    <div class="text-center text-[10px] text-zinc-500 tracking-widest uppercase">
        Click or drag the corners of the page to turn
    </div>

    <!-- Inisialisasi Script Efek Buku -->
    <script type="text/javascript">
        $(document).ready(function() {
            $("#flipbook").turn({
                width: 800,
                height: 500,
                autoCenter: true,
                duration: 1000 // Kecepatan membalik halaman dalam milidetik
            });
        });
    </script>
</body>
</html>
